components:
  securitySchemes:
    BearerApiKeyAuth:
      type: http
      scheme: bearer
      description: API key passed as a Bearer token in the Authorization header.
  schemas:
    Meter:
      type: object
      required:
        - name
        - event_name
        - meter_type
        - data_type
        - aggregation
        - is_incremental
        - reporting_method
      properties:
        name:
          type: string
          description: Unique identifier name for the meter.
        display_name:
          type: string
          description: Human-readable display name for the meter.
        description:
          type: string
          description: Description of what this meter tracks.
        event_name:
          type: string
          description: The event name this meter listens to.
        meter_type:
          type: string
          description: Type of meter (e.g., counter, gauge).
        data_type:
          type: string
          enum: [INT, FLOAT, STRING]
          description: Data type of the measurement value.
        aggregation:
          type: string
          enum: [SUM, COUNT, MAX, MIN, UNIQUE_COUNT]
          description: Aggregation method applied to measurements.
        unit_name:
          type: string
          description: Human-readable unit name (e.g., "API calls", "GB").
        is_incremental:
          type: boolean
          description: Whether measurements are incremental or absolute.
        reporting_method:
          type: string
          enum: [periodic, total]
          description: How usage is reported.
        expected_labels:
          type: array
          items:
            type: string
          description: Expected label keys on measurements.
        primary_labels:
          type: array
          items:
            type: string
          description: Primary label keys used for grouping.
        event_label_filter:
          type: object
          description: Filter expression for event labels.
    CreateMeterArgs:
      type: object
      properties:
        name:
          type: string
          description: Unique name for the meter.
        display_name:
          type: string
          description: Human-readable display name.
        description:
          type: string
          description: Description of the meter.
        event_name:
          type: string
          description: Event name this meter tracks.
        meter_type:
          type: string
          description: Type of meter.
        data_type:
          type: string
          enum: [INT, FLOAT, STRING]
        aggregation:
          type: string
          enum: [SUM, COUNT, MAX, MIN, UNIQUE_COUNT]
        unit_name:
          type: string
        is_incremental:
          type: boolean
        reporting_method:
          type: string
          enum: [periodic, total]
        expected_labels:
          type: array
          items:
            type: string
        primary_labels:
          type: array
          items:
            type: string
        event_label_filter:
          type: object
    UpdateMeterArgs:
      type: object
      properties:
        description:
          type: string
          description: Updated description for the meter.
        display_name:
          type: string
          description: Updated display name for the meter.
    Measurement:
      type: object
      required:
        - value
      properties:
        id:
          type: string
          description: Unique identifier for the measurement.
        meter_name:
          type: string
          description: Name of the meter this measurement belongs to.
        customer_name:
          type: string
          description: Name of the customer this measurement belongs to.
        event_name:
          type: string
          description: Name of the event that generated this measurement.
        value:
          type: number
          description: The measured value.
        time:
          type: string
          format: date-time
          description: Timestamp of when the measurement occurred.
        labels:
          type: object
          additionalProperties:
            type: string
          description: Key-value labels associated with the measurement.
        reset_total:
          type: boolean
          description: Whether to reset the running total.
    Customer:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Unique name identifier for the customer.
        display_name:
          type: string
          description: Human-readable display name.
        contact_info:
          $ref: '#/components/schemas/ContactInfo'
        created_at:
          type: string
          format: date-time
          description: When the customer was created.
        measurement_mappings:
          type: array
          items:
            type: object
          description: Measurement label mappings for the customer.
        tags:
          type: array
          items:
            type: object
          description: Tags associated with the customer.
    CreateCustomerArgs:
      type: object
      properties:
        name:
          type: string
          description: Unique name identifier for the customer.
        display_name:
          type: string
          description: Human-readable display name.
        vendor_id:
          type: string
          description: External vendor identifier for the customer.
        contact_info:
          $ref: '#/components/schemas/ContactInfoInputArgs'
        price_plan_name:
          type: string
          description: Name of the price plan to subscribe the customer to.
