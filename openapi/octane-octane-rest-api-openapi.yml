openapi: 3.0.3
info:
  title: Octane REST API
  description: >-
    REST API for managing meters, customers, pricing plans, subscriptions,
    measurements, and real-time usage data for usage-based billing workflows.
    Octane enables infrastructure and SaaS companies to implement flexible
    pay-as-you-go billing similar to Snowflake and AWS.
  version: 1.0.0
  contact:
    name: Octane Support
    url: https://www.getoctane.io
servers:
  - url: https://api.getoctane.io
    description: Octane Production API
security:
  - BearerApiKeyAuth: []
tags:
  - name: Meters
    description: Manage usage meters that track events and aggregate data
  - name: Measurements
    description: Submit usage measurements for customers
  - name: Live Measurements
    description: Real-time usage measurement retrieval
  - name: Customers
    description: Manage customers and their subscriptions, billing, and settings
  - name: Price Plans
    description: Manage pricing plans with metered components and flat rates
  - name: Subscriptions
    description: Manage customer subscriptions to price plans
  - name: Invoices
    description: Access and manage customer invoices
  - name: Coupons
    description: Manage discount coupons
  - name: Credits
    description: Manage customer credit grants and ledgers
  - name: Webhooks
    description: Manage webhook endpoints
  - name: Features
    description: Manage product features
  - name: Billing Settings
    description: Manage vendor billing settings
  - name: Customer Portal
    description: End-customer portal operations
  - name: Admin
    description: Administrative operations
  - name: Avalara
    description: Avalara tax integration
  - name: Revenue Recognition
    description: Revenue recognition reporting
  - name: Refunds
    description: Process customer refunds
paths:
  /meters:
    get:
      summary: Get Meters
      description: Get all meters for a given vendor.
      operationId: metersGet
      tags:
        - Meters
      responses:
        '200':
          description: List of meters
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Meter'
    post:
      summary: Create Meter
      description: Create a new usage meter.
      operationId: metersPost
      tags:
        - Meters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMeterArgs'
      responses:
        '200':
          description: Created meter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meter'
  /meters/{meter_name}:
    get:
      summary: Get Meter
      description: Get a meter by its unique name.
      operationId: metersMeterNameGet
      tags:
        - Meters
      parameters:
        - name: meter_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Meter details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meter'
    put:
      summary: Update Meter
      description: Update a meter by its unique name.
      operationId: metersMeterNamePut
      tags:
        - Meters
      parameters:
        - name: meter_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeterArgs'
      responses:
        '200':
          description: Updated meter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Meter'
    delete:
      summary: Delete Meter
      description: Delete a meter by its unique name.
      operationId: metersMeterNameDelete
      tags:
        - Meters
      parameters:
        - name: meter_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Meter deleted
  /meters/{meter_name}/archive:
    post:
      summary: Archive Meter
      description: Archive a meter by its unique name.
      operationId: metersMeterNameArchivePost
      tags:
        - Meters
      parameters:
        - name: meter_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Meter archived
  /measurements:
    post:
      summary: Send Measurement
      description: Submit a single usage measurement for a customer.
      operationId: measurementsPost
      tags:
        - Measurements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Measurement'
      responses:
        '200':
          description: Created measurement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Measurement'
  /measurements/multi:
    post:
      summary: Send Batched Measurements
      description: Submit multiple usage measurements in a single request.
      operationId: measurementsMultiPost
      tags:
        - Measurements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/Measurement'
      responses:
        '200':
          description: Created measurements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Measurement'
  /live_measurements:
    get:
      summary: Get Live Measurements
      description: Retrieve real-time usage measurements.
      operationId: liveMeasurementsGet
      tags:
        - Live Measurements
      responses:
        '200':
          description: Live measurement data
          content:
            application/json:
              schema:
                type: object
  /customers:
    get:
      summary: List Customers
      description: Get all customers for a given vendor.
      operationId: customersGet
      tags:
        - Customers
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Customer'
    post:
      summary: Create Customer
      description: Create a new customer.
      operationId: customersPost
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCustomerArgs'
      responses:
        '200':
          description: Created customer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
  /customers/{customer_name}:
    get:
      summary: Get Customer
      description: Get a customer by their unique name.
      operationId: customersCustomerNameGet
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Customer'
    delete:
      summary: Delete Customer
      description: Delete a customer by their unique name.
      operationId: customersCustomerNameDelete
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Customer deleted
  /customers/{customer_name}/active_subscription:
    get:
      summary: Get Customer Active Subscription
      description: Get the active subscription for a customer.
      operationId: customersCustomerNameActiveSubscriptionGet
      tags:
        - Subscriptions
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Active subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSubscription'
    post:
      summary: Create Customer Subscription
      description: Subscribe a customer to a price plan.
      operationId: customersCustomerNameActiveSubscriptionPost
      tags:
        - Subscriptions
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSubscriptionArgs'
      responses:
        '200':
          description: Active subscription
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActiveSubscription'
  /customers/{customer_name}/billing_settings:
    get:
      summary: Get Customer Billing Settings
      description: Get billing settings for a customer.
      operationId: customersCustomerNameBillingSettingsGet
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Billing settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSettings'
    post:
      summary: Create Customer Billing Settings
      description: Create billing settings for a customer.
      operationId: customersCustomerNameBillingSettingsPost
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerBillingSettingsInputArgs'
      responses:
        '200':
          description: Billing settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSettings'
    put:
      summary: Update Customer Billing Settings
      description: Update billing settings for a customer.
      operationId: customersCustomerNameBillingSettingsPut
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerBillingSettingsInputArgs'
      responses:
        '200':
          description: Updated billing settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillingSettings'
    delete:
      summary: Delete Customer Billing Settings
      description: Delete billing settings for a customer.
      operationId: customersCustomerNameBillingSettingsDelete
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Billing settings deleted
  /customers/{customer_name}/invoices:
    get:
      summary: List Customer Invoices
      description: Get all invoices for a customer with optional filtering.
      operationId: customersCustomerNameInvoicesGet
      tags:
        - Invoices
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
        - name: start_time
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
        - name: sort_column
          in: query
          schema:
            type: string
        - name: sort_direction
          in: query
          schema:
            type: string
        - name: forward_sort_offset
          in: query
          schema:
            type: string
        - name: forward_secondary_sort_offset
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
  /customers/{customer_name}/credit_balance:
    get:
      summary: Get Customer Credit Balance
      description: Get the current credit balance for a customer.
      operationId: customersCustomerNameCreditBalanceGet
      tags:
        - Credits
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerCreditBalance'
  /customers/{customer_name}/credit_top_off_plan:
    get:
      summary: Get Customer Credit Top-Off Plan
      description: Get the credit top-off plan for a customer.
      operationId: customersCustomerNameCreditTopOffPlanGet
      tags:
        - Credits
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Credit top-off plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditTopOffPlan'
    post:
      summary: Create Customer Credit Top-Off Plan
      description: Create a credit top-off plan for a customer.
      operationId: customersCustomerNameCreditTopOffPlanPost
      tags:
        - Credits
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditTopOffPlanInputArgs'
      responses:
        '200':
          description: Created credit top-off plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditTopOffPlan'
    put:
      summary: Update Customer Credit Top-Off Plan
      description: Update the credit top-off plan for a customer.
      operationId: customersCustomerNameCreditTopOffPlanPut
      tags:
        - Credits
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditTopOffPlanInputArgs'
      responses:
        '200':
          description: Updated credit top-off plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditTopOffPlan'
    delete:
      summary: Delete Customer Credit Top-Off Plan
      description: Delete the credit top-off plan for a customer.
      operationId: customersCustomerNameCreditTopOffPlanDelete
      tags:
        - Credits
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Credit top-off plan deleted
  /customers/{customer_name}/adhoc_charges:
    get:
      summary: List Customer Adhoc Charges
      description: Get all adhoc charges for a customer.
      operationId: customersCustomerNameAdhocChargesGet
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of adhoc charges
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AdhocCharge'
    post:
      summary: Create Customer Adhoc Charge
      description: Create an adhoc charge for a customer.
      operationId: customersCustomerNameAdhocChargesPost
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAdhocChargeArgs'
      responses:
        '200':
          description: Created adhoc charge
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdhocCharge'
  /customers/{customer_name}/adhoc_charges/{uuid}:
    get:
      summary: Get Customer Adhoc Charge
      description: Get a specific adhoc charge for a customer.
      operationId: customersCustomerNameAdhocChargesUuidGet
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Adhoc charge details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdhocCharge'
    delete:
      summary: Delete Customer Adhoc Charge
      description: Delete an adhoc charge for a customer.
      operationId: customersCustomerNameAdhocChargesUuidDelete
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Adhoc charge deleted
  /customers/{customer_name}/discounts:
    post:
      summary: Create Customer Discount
      description: Apply a discount to a customer.
      operationId: customersCustomerNameDiscountsPost
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscountInputArgs'
      responses:
        '200':
          description: Discount applied
          content:
            application/json:
              schema:
                type: object
    delete:
      summary: Delete Customer Discounts
      description: Remove discounts from a customer.
      operationId: customersCustomerNameDiscountsDelete
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Discounts removed
  /customers/{customer_name}/features/{feature_name}:
    get:
      summary: Get Customer Feature
      description: Get a specific feature entitlement for a customer.
      operationId: customersCustomerNameFeaturesFeatureNameGet
      tags:
        - Features
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
        - name: feature_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Customer feature entitlement
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerFeature'
  /customers/{customer_name}/mappings:
    get:
      summary: List Customer Measurement Mappings
      description: Get measurement mappings for a customer.
      operationId: customersCustomerNameMappingsGet
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Measurement mappings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CustomerMeasurementMapping'
    post:
      summary: Create Customer Measurement Mapping
      description: Create a measurement mapping for a customer.
      operationId: customersCustomerNameMappingsPost
      tags:
        - Customers
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerMeasurementMappingInputArgs'
      responses:
        '200':
          description: Created measurement mapping
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomerMeasurementMapping'
  /customers/{customer_name}/accrued_revenue:
    get:
      summary: Get Customer Accrued Revenue
      description: Get accrued revenue for a customer.
      operationId: customersCustomerNameAccruedRevenueGet
      tags:
        - Revenue Recognition
      parameters:
        - name: customer_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Accrued revenue data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccruedRevenue'
  /price_plans:
    get:
      summary: List Price Plans
      description: Get all price plans for a vendor.
      operationId: pricePlansGet
      tags:
        - Price Plans
      responses:
        '200':
          description: List of price plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PricePlan'
    post:
      summary: Create Price Plan
      description: Create a new price plan.
      operationId: pricePlansPost
      tags:
        - Price Plans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePricePlanArgs'
      responses:
        '200':
          description: Created price plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricePlan'
  /price_plans/paginate:
    get:
      summary: List Price Plans Paginated
      description: Get price plans with pagination support.
      operationId: pricePlansPaginateGet
      tags:
        - Price Plans
      responses:
        '200':
          description: Paginated price plans
          content:
            application/json:
              schema:
                type: object
  /price_plans/self_serve:
    get:
      summary: List Self-Serve Price Plans
      description: Get price plans available for self-serve enrollment.
      operationId: pricePlansSelfServeGet
      tags:
        - Price Plans
      responses:
        '200':
          description: Self-serve price plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PricePlan'
  /price_plans/{price_plan_name}:
    get:
      summary: Get Price Plan
      description: Get a price plan by its unique name.
      operationId: pricePlansPricePlanNameGet
      tags:
        - Price Plans
      parameters:
        - name: price_plan_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Price plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricePlan'
    put:
      summary: Update Price Plan
      description: Update a price plan by its unique name.
      operationId: pricePlansPricePlanNamePut
      tags:
        - Price Plans
      parameters:
        - name: price_plan_name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePricePlanArgs'
      responses:
        '200':
          description: Updated price plan
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricePlan'
    delete:
      summary: Delete Price Plan
      description: Delete a price plan by its unique name.
      operationId: pricePlansPricePlanNameDelete
      tags:
        - Price Plans
      parameters:
        - name: price_plan_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Price plan deleted
  /price_plans/{price_plan_name}/archive:
    post:
      summary: Archive Price Plan
      description: Archive a price plan by its unique name.
      operationId: pricePlansPricePlanNameArchivePost
      tags:
        - Price Plans
      parameters:
        - name: price_plan_name
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Price plan archived
  /price_plans/{price_plan_name}/{tag}:
    get:
      summary: Get Price Plan by Tag
      description: Get a price plan by name and tag.
      operationId: pricePlansPricePlanNameTagGet
      tags:
        - Price Plans
      parameters:
        - name: price_plan_name
          in: path
          required: true
          schema:
            type: string
        - name: tag
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Price plan details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricePlan'
  /price_plans/metered_components/{uuid}/update_limits:
    post:
      summary: Update Metered Component Limits
      description: Update usage limits for a metered component on a price plan.
      operationId: pricePlansMeteredComponentsUuidUpdateLimitsPost
      tags:
        - Price Plans
      parameters:
        - name: uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated limits
          content:
            application/json:
              schema:
                type: object
  /invoices:
    get:
      summary: List Invoices
      description: Get all invoices for a vendor.
      operationId: invoicesGet
      tags:
        - Invoices
      responses:
        '200':
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Invoice'
  /invoices/{invoice_uuid}:
    get:
      summary: Get Invoice
      description: Get an invoice by its UUID.
      operationId: invoicesInvoiceUuidGet
      tags:
        - Invoices
      parameters:
        - name: invoice_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invoice details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
    delete:
      summary: Delete Invoice
      description: Delete an invoice by its UUID.
      operationId: invoicesInvoiceUuidDelete
      tags:
        - Invoices
      parameters:
        - name: invoice_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Invoice deleted
  /invoices/{invoice_uuid}/retries:
    post:
      summary: Retry Invoice Payment
      description: Retry payment collection for a failed invoice.
      operationId: invoicesInvoiceUuidRetriesPost
      tags:
        - Invoices
      parameters:
        - name: invoice_uuid
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Retry initiated
          content:
            application/json:
              schema:
                type: object
  /invoices/{invoice_uuid}/status:
    post:
      summary: Update Invoice Status
      description: Update the status of an invoice.
      operationId: invoicesInvoiceUuidStatusPost
      tags:
        - Invoices
