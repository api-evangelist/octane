openapi: 3.0.3
info:
  title: Octane REST Admin Live Measurements API
  description: REST API for managing meters, customers, pricing plans, subscriptions, measurements, and real-time usage data for usage-based billing workflows. Octane enables infrastructure and SaaS companies to implement flexible pay-as-you-go billing similar to Snowflake and AWS.
  version: 1.0.0
  contact:
    name: Octane Support
    url: https://www.getoctane.io
servers:
- url: https://api.getoctane.io
  description: Octane Production API
security:
- BearerApiKeyAuth: []
tags:
- name: Live Measurements
  description: Real-time usage measurement retrieval
paths:
  /live_measurements:
    get:
      summary: Get Live Measurements
      description: Retrieve real-time usage measurements.
      operationId: liveMeasurementsGet
      tags:
      - Live Measurements
      responses:
        '200':
          description: Live measurement data
          content:
            application/json:
              schema:
                type: object
components:
  securitySchemes:
    BearerApiKeyAuth:
      type: http
      scheme: bearer
      description: API key passed as a Bearer token in the Authorization header.
